---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app lancommander
  namespace: gaming
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 1h

  values:
    controllers:
      lancommander:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [{
                "name":"multus-clients",
                "namespace": "networking",
                "ips": ["192.168.20.227/24"]
              }
              ]
        containers:
          app:
            image:
              repository: docker.io/lancommander/lancommander
              tag: v2.1.8@sha256:6c02a5962750ff8cb935b83960000ca6be856a3a2444a7f7058fc16bb30fbbef
            resources:
              requests:
                cpu: 20m
                memory: 256Mi
              limits:
                memory: 1Gi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            env:
              - name: PUID
                value: "1000"
              - name: PGID
                value: "1000"
              - name: STEAMCMD
                value: "1"
              - name: WINE
                value: "1"

    service:
      app:
        controller: lancommander
        ports:
          http:
            port: &httpPort 1337
            protocol: TCP
          beacon:
            port: 35891
            protocol: UDP
          ipx:
            port: 213
            protocol: UDP
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *httpPort
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: mdi-lan
          gethomepage.dev/name: Lan Commander
          gethomepage.dev/group: Gaming
          gethomepage.dev/description: LAN Game Hosting and Management
          hajimari.io/enable: "true"
          hajimari.io/appName: Lan Commander
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/Data
      library:
        type: nfs
        server: nas.${PUBLIC_DOMAIN}
        path: /mnt/tank/games
        globalMounts:
          - path: /mnt/nas_games
