---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: nas
spec:
  endpoints:
    - dnsName: nas.${PUBLIC_DOMAIN}
      recordTTL: 180
      recordType: A
      targets:
        - 192.168.1.100
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: unifi
spec:
  endpoints:
    - dnsName: unifi.${SECRET_DOMAIN}
      recordTTL: 180
      recordType: A
      targets:
        - 192.168.1.1

---
apiVersion: externaldns.k8s.io/v1alpha1
