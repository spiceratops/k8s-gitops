---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app hermes
  namespace: ai
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 1h

  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      hermes:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image: &image
              repository: nousresearch/hermes-agent
              tag: v2026.6.5@sha256:9ad3b04ec916ea2c2da22358fd43b024c788d74073210695af88bfc2e63869b4
            command: ["hermes", "gateway", "run", "--no-supervise"]
            env:
              TZ: ${TIMEZONE}
              API_SERVER_ENABLED: true
              API_SERVER_HOST: 0.0.0.0
              API_SERVER_PORT: &port 8642
              HERMES_HOME: /opt/data
              HOME: /opt/data
              WHATSAPP_ENABLED: true
              WHATSAPP_MODE: bot
              WIKI_PATH: /mnt/wiki
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            resources:
              requests:
                cpu: 500m
              limits:
                memory: 2Gi
            ports:
              - containerPort: *port
                name: http
                protocol: TCP
          dashboard:
            image: *image
            env:
              TZ: ${TIMEZONE}
              GATEWAY_HEALTH_URL: http://localhost:8642
            args:
              - dashboard
              - --host
              - "0.0.0.0"
              - --insecure
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: 500m
              limits:
                memory: 1Gi
            ports:
              - containerPort: &dashboard_port 9119
                name: http
                protocol: TCP
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
      dashboard:
        controller: *app
        ports:
          http:
            port: *dashboard_port
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - identifier: dashboard
                port: http
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: AI
          gethomepage.dev/name: Hermes Dashboard
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /opt/data
      gallery:
        type: nfs
        server: nas.${PUBLIC_DOMAIN}
        path: /mnt/tank/ai/output
        globalMounts:
          - path: /mnt/gallery
      tts:
        type: nfs
        server: nas.${PUBLIC_DOMAIN}
        path: /mnt/tank/ai/tts
        globalMounts:
          - path: /mnt/tts
      skills:
        type: nfs
        server: nas.${PUBLIC_DOMAIN}
        path: /mnt/tank/ai/skills
        globalMounts:
          - path: /mnt/skills
            readOnly: true
      wiki:
        type: nfs
        server: nas.${PUBLIC_DOMAIN}
        path: /mnt/tank/ai/wiki
        globalMounts:
          - path: /mnt/wiki
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
    serviceAccount:
      hermes: {}
    rbac:
      roles:
        # Broad read-only access across cluster resources. Secrets intentionally excluded.
        hermes-read-all:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources:
                [
                  "pods",
                  "pods/log",
                  "nodes",
                  "services",
                  "namespaces",
                  "configmaps",
                  "persistentvolumes",
                  "persistentvolumeclaims",
                  "endpoints",
                  "resourcequotas",
                  "limitranges",
                  "serviceaccounts",
                  "events",
                ]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apps"]
              resources:
                [
                  "deployments",
                  "daemonsets",
                  "statefulsets",
                  "replicasets",
                  "controllerrevisions",
                ]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["batch"]
              resources: ["jobs", "cronjobs"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["networking.k8s.io"]
              resources: ["ingresses", "ingressclasses", "networkpolicies"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["storage.k8s.io"]
              resources:
                [
                  "storageclasses",
                  "csinodes",
                  "csidrivers",
                  "volumeattachments",
                ]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["autoscaling"]
              resources: ["horizontalpodautoscalers"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["policy"]
              resources: ["poddisruptionbudgets"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["coordination.k8s.io"]
              resources: ["leases"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources:
                ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apiextensions.k8s.io"]
              resources: ["customresourcedefinitions"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apiregistration.k8s.io"]
              resources: ["apiservices"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["metrics.k8s.io"]
              resources: ["nodes", "pods"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["helm.toolkit.fluxcd.io"]
              resources: ["helmreleases"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["kustomize.toolkit.fluxcd.io"]
              resources: ["kustomizations"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources:
                [
                  "gitrepositories",
                  "helmrepositories",
                  "ocirepositories",
                  "buckets",
                  "helmcharts",
                ]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["external-secrets.io"]
              resources:
                ["externalsecrets", "secretstores", "clustersecretstores"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["monitoring.coreos.com"]
              resources:
                [
                  "prometheuses",
                  "alertmanagers",
                  "servicemonitors",
                  "podmonitors",
                  "prometheusrules",
                  "thanosrulers",
                  "probes",
                ]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["snapshot.storage.k8s.io"]
              resources:
                [
                  "volumesnapshots",
                  "volumesnapshotcontents",
                  "volumesnapshotclasses",
                ]
              verbs: ["get", "list", "watch"]
      bindings:
        hermes-read-all:
          type: ClusterRoleBinding
          roleRef:
            identifier: hermes-read-all
          subjects:
            - identifier: hermes
              serviceAccount: hermes
