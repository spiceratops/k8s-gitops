---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes
  namespace: ai
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: hermes-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        ## API Keys
        LITELLM_API_KEY: "{{ .APIKEY_HERMES }}"
        ## Connections
        WHATSAPP_ALLOWED_USERS: "{{ .WHATSAPP_PHONE_NUMBER }}"
        DISCORD_BOT_TOKEN: "{{ .DISCORD_BOT_TOKEN }}"
        DISCORD_ALLOWED_USERS: "{{ .DISCORD_ALLOWED_USERS }}"
        ## Hermes
        API_SERVER_KEY: "{{ .HERMES_API_SERVER_KEY }}"
  dataFrom:
    - extract:
        key: hermes
    - extract:
        key: litellm
