---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app comfyui
  namespace: ai
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 1h

  values:
    controllers:
      comfyui:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: yanwk/comfyui-boot
              tag: cpu@sha256:7e171c11cbe4b170c7a453c50f1d9660d5a0560a4ffc9a69aa5af21e97bf868d
            securityContext:
              privileged: true
            env:
              CLI_ARGS: "--listen 0.0.0.0 --port 8188 --disable-mmap --cpu"
            resources:
              requests:
                cpu: 1
                memory: 8Gi
              limits:
                memory: 16Gi
    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 8188
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - port: *port
                name: *app
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: AI
          gethomepage.dev/name: Comfyui
    persistence:
      comfyui:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /root/ComfyUI/
      data:
        type: nfs
        server: nas.${PUBLIC_DOMAIN}
        path: /mnt/tank/ai
        globalMounts:
          - path: /root/ComfyUI/output
            subPath: output
          - path: /root/ComfyUI/input
            subPath: input
