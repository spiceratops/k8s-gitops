---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agentmail-mcp
  namespace: ai
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: agentmail-mcp-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        API_KEY: "{{ .API_KEY }}"
  dataFrom:
    - extract:
        key: agentmail
