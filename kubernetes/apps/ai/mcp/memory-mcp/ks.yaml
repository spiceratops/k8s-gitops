---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &appname memory-mcp
  namespace: flux-system
spec:
  targetNamespace: ai
  commonMetadata:
    labels:
      app.kubernetes.io/name: *appname
  dependsOn:
    - name: toolhive
    - name: volsync
      namespace: volsync-system
  components:
    - ../../../../components/volsync/nfs-nas
  path: ./kubernetes/apps/ai/mcp/memory-mcp/mcp
  prune: true
  sourceRef:
    kind: GitRepository
    name: k8s-gitops
    namespace: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: *appname
