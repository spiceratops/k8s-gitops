---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app opencode
  namespace: ai
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 1h

  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      opencode:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          copy-config:
            image:
              repository: busybox
              tag: 1.38
            securityContext:
              runAsUser: 0
            command:
              - sh
              - -c
              - cp /config/opencode.jsonc /home/opencode/.config/opencode/opencode.jsonc
        containers:
          app:
            image:
              repository: ghcr.io/anomalyco/opencode
              tag: 1.17.12@sha256:566f3d1abdf7a6529aa8bac9981107c7e76e84dfe1c841b5a9d0c80b3545a1c1
            env:
              TZ: ${TIMEZONE}
              CORS_DOMAIN: ${SECRET_DOMAIN}
              HOME: /home/opencode
            envFrom:
              - secretRef:
                  name: opencode-secret
            command:
              - opencode
              - web
              - --hostname
              - "0.0.0.0"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet: &probe
                    path: /
                    port: &port 4096
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet: *probe
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - port: *port
                name: *app
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: AI
          gethomepage.dev/name: Opencode
    persistence:
      # config:
      #   existingClaim: *app
      #   globalMounts:
      #     - path: /home/opencode/.config/opencode
      config-file:
        type: configMap
        name: opencode-config
        globalMounts:
          - path: /config
      code:
        type: nfs
        server: nas.${PUBLIC_DOMAIN}
        path: /mnt/tank/code/opencode
        globalMounts:
          - path: /home/opencode
