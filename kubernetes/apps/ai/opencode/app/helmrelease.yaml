---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app opencode
  namespace: ai
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 1h

  values:
    controllers:
      opencode:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/anomalyco/opencode
              tag: 1.17.17@sha256:118e85b2107e7a3bd251bd690e7ab9f008ec691919706844886c416d780ce90c
            env:
              TZ: ${TIMEZONE}
              CORS_DOMAIN: ${SECRET_DOMAIN}
              HOME: /home/opencode
              OPENCODE_CONFIG: /config/opencode.jsonc
            envFrom:
              - secretRef:
                  name: opencode-secret
            command:
              - opencode
              - web
              - --hostname
              - "0.0.0.0"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet: &probe
                    path: /
                    port: &port 4096
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet: *probe
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - port: *port
                name: *app
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: AI
          gethomepage.dev/name: Opencode
    persistence:
      home:
        existingClaim: *app
        globalMounts:
          - path: /home/opencode
      config-file:
        type: configMap
        name: opencode-config
        globalMounts:
          - path: /config/opencode.jsonc
            subPath: opencode.jsonc
