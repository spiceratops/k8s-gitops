---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app hindsight
  namespace: ai
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      hindsight:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: hindsight-secret
        containers:
          api:
            image:
              repository: ghcr.io/vectorize-io/hindsight-api
              tag: 0.8.2
            env:
              TZ: ${TIMEZONE}
              HINDSIGHT_API_LLM_PROVIDER: "opencode-go"
            envFrom:
              - secretRef:
                  name: hindsight-secret
            # probes:
            #   liveness:
            #     enabled: true
            #     custom: true
            #     spec:
            #       httpGet: &probe
            #         path: /health
            #         port: 8888
            #       initialDelaySeconds: 30
            #       periodSeconds: 10
            #       timeoutSeconds: 5
            #       failureThreshold: 3
            #   readiness:
            #     enabled: true
            #     custom: true
            #     spec:
            #       httpGet: *probe
            #       initialDelaySeconds: 10
            #       periodSeconds: 5
            #       timeoutSeconds: 3
            #       failureThreshold: 3
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                cpu: 500m
                memory: 4Gi
          controlplane:
            image:
              repository: ghcr.io/vectorize-io/hindsight-control-plane
              tag: 0.8.2
            env:
              TZ: ${TIMEZONE}
              NODE_ENV: "production"
              HINDSIGHT_CP_HOSTNAME: "0.0.0.0"
              HINDSIGHT_CP_PORT: "3000"
              HINDSIGHT_CP_DATAPLANE_API_URL: "http://hindsight-api"
            envFrom:
              - secretRef:
                  name: hindsight-secret
            # probes:
            #   liveness:
            #     enabled: true
            #     custom: true
            #     spec:
            #       tcpSocket: &probeCP
            #         port: &portCP 3000
            #       initialDelaySeconds: 30
            #       periodSeconds: 10
            #       timeoutSeconds: 5
            #       failureThreshold: 3
            #   readiness:
            #     enabled: true
            #     custom: true
            #     spec:
            #       tcpSocket: *probeCP
            #       initialDelaySeconds: 10
            #       periodSeconds: 5
            #       timeoutSeconds: 3
            #       failureThreshold: 3
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 2Gi
    service:
      api:
        controller: *app
        ports:
          http:
            port: &port 8888
      controlplane:
        controller: *app
        ports:
          http:
            port: &portCP 3000
    route:
      api:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - port: *portCP
                name: controlplane
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: AI
          gethomepage.dev/name: Hindsight
