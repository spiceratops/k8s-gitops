model_list:
  # Google
  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-flash-latest
      api_key: os.environ/GOOGLE_API_KEY

  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-pro-latest
      api_key: os.environ/GOOGLE_API_KEY

  - model_name: gemini-image-flash
    litellm_params:
      model: gemini/gemini-3.1-flash-image-preview
      api_key: os.environ/GOOGLE_API_KEY
    model_info:
      mode: image_generation

  - model_name: gemini-image-pro
    litellm_params:
      model: gemini/gemini-3-pro-image-preview
      api_key: os.environ/GOOGLE_API_KEY
    model_info:
      mode: image_generation

  # Ollama
  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text:latest
      api_base: "http://studio-pc.${SECRET_DOMAIN}:11434"
    model_info:
      mode: embedding

  - model_name: all-minilm:22m
    litellm_params:
      model: ollama/all-minilm:22m
      api_base: "http://studio-pc.${SECRET_DOMAIN}:11434"
    model_info:
      mode: embedding

  - model_name: mxbai-embed-large
    litellm_params:
      model: ollama/mxbai-embed-large:latest
      api_base: "http://studio-pc.${SECRET_DOMAIN}:11434"
    model_info:
      mode: embedding

  - model_name: gemma4-local
    litellm_params:
      model: ollama_chat/gemma4
      api_base: "http://studio-pc.${SECRET_DOMAIN}:11434"
    model_info:
      mode: completion

  - model_name: qwen-local
    model_info:
      max_input_tokens: 16384
      max_output_tokens: 8192
      supports_function_calling: true
      supports_vision: true
    litellm_params:
      model: openai/qwen3.6
      api_base: "http://studio-pc.${SECRET_DOMAIN}:11434"
      drop_params: true

general_settings:
  proxy_batch_write_at: 60 # Batch write spend updates every 60s
  database_connection_pool_limit: 10 # limit the number of database connections to = MAX Number of DB Connections/Number of instances of litellm proxy (Around 10-20 is good number)
  use_redis_transaction_buffer: true # HA

router_settings:
  routing_strategy: usage-based-routing-v2
  redis_host: os.environ/REDIS_HOST

litellm_settings:
  success_callback: ["prometheus"]
  prometheus_adapter: true
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
  drop_params: false
  request_timeout: 600
  num_retries: 2
  retry_after: 5
  set_verbose: false

mcp_servers:
  resources:
    url: "http://vmcp-resources.ai.svc.cluster.local:4483/mcp"
  search:
    url: "http://vmcp-search.ai.svc.cluster.local:4483/mcp"
  observability:
    url: "http://vmcp-observability.ai.svc.cluster.local:4483/mcp"

environment:
  - GOOGLE_API_KEY
  - REDIS_HOST
  - REDIS_PORT
