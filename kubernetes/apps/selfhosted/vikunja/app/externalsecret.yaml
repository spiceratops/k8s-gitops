---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vikunja
  namespace: selfhosted
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: vikunja-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # App
        VIKUNJA_SERVICE_JWT_SECRET: "{{ .VIKUNJA_SERVICE_JWT_SECRET }}"
        VIKUNJA_DATABASE_HOST: &dbHost postgres-rw.dbms.svc.cluster.local
        VIKUNJA_DATABASE_DATABASE: &dbName vikunja
        VIKUNJA_DATABASE_USER: &dbUser "{{ .VIKUNJA_DATABASE_USER }}"
        VIKUNJA_DATABASE_PASSWORD: &dbPass "{{ .VIKUNJA_DATABASE_PASSWORD }}"
        # Postgres Init
        INIT_POSTGRES_DBNAME: *dbName
        INIT_POSTGRES_HOST: *dbHost
        INIT_POSTGRES_USER: *dbUser
        INIT_POSTGRES_PASS: *dbPass
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        # OIDC
        config.yml: |
          auth:
            local:
              enabled: false
            openid:
              enabled: true
              redirecturl: https://vikunja.${SECRET_DOMAIN}/auth/openid
              providers:
                - name: Pocket-Id
                  authurl: https://id.${SECRET_DOMAIN}
                  clientid: {{ .VIKUNJA_OIDC_CLIENT_ID }}
                  clientsecret: {{ .VIKUNJA_OIDC_CLIENT_SECRET }}
                  scope: openid profile email
  dataFrom:
    - extract:
        key: vikunja
    - extract:
        key: pocket-id
    - extract:
        key: cloudnative-pg
