---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actualsync
  namespace: selfhosted
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 1h

  values:
    controllers:
      actualsync:
        annotations:
          reloader.stakater.com/auto: "true"
        type: cronjob
        cronjob:
          schedule: "0 4 * * *"
          concurrencyPolicy: Forbid
          ttlSecondsAfterFinished: 86400
          startingDeadlineSeconds: 30
          successfulJobsHistory: 1
          failedJobsHistory: 1
          backoffLimit: 6
        containers:
          app:
            image:
              repository: timsmart/actualbudget-sync
              tag: main
            args:
              - "--bank"
              - up
              - "--accounts"
              - $UP_ACCOUNT_ID
              - "--accounts"
              - $UP_ACCOUNT_ID2
              - "--accounts"
              - $UP_ACCOUNT_ID3
              - "--accounts"
              - $UP_ACCOUNT_ID4
              - "--categorize"
            envFrom:
              - secretRef:
                  name: actualsync-secret
            env:
              - name: ACTUAL_SERVER
                value: https://actual.${SECRET_DOMAIN}
              - name: ACTUAL_DATA
                value: /data
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /data
