---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: garage-system
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
configMapGenerator:
  - name: garage-configmap
    files:
      - resources/garage_config.yaml
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
