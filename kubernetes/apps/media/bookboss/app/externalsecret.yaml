---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bookboss
  namespace: media
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: bookboss-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        BOOKBOSS__ENCRYPTION_SECRET: "{{ .BOOKBOSS_ENCRYPTION_SECRET }}"
        BOOKBOSS__METADATA__HARDCOVER_API_TOKEN: "{{ .HARDCOVER_API_TOKEN }}"
        BOOKBOSS__OIDC__CLIENT_ID: "{{ .BOOKBOSS_OIDC_CLIENT_ID }}"
        BOOKBOSS__OIDC__CLIENT_SECRET: "{{ .BOOKBOSS_OIDC_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: bookboss
