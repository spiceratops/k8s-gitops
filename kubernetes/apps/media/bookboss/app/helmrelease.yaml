---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app bookboss
  namespace: media
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 1h

  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      bookboss:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          bookboss:
            image:
              repository: ghcr.io/szinn/bookboss
              tag: v0.8.30@sha256:073a9e71fb731e624fe5d8f415df457685b5b3c66a613f610c3188a6c689a3db
            env:
              BOOKBOSS__DATABASE__DATABASE_URL: sqlite:///data/bookboss.db?mode=rwc
              BOOKBOSS__FRONTEND__BASE_URL: https://books.${SECRET_DOMAIN}
              BOOKBOSS__FRONTEND__LISTEN_PORT: &port 80
              BOOKBOSS__LIBRARY__LIBRARY_PATH: /library/books
              BOOKBOSS__IMPORT__BOOKDROP_PATH: /library/bookdrop
              BOOKBOSS__IMPORT__POLL_INTERVAL_SECS: 60
              BOOKBOSS__IMPORT__WORKER_POLL_INTERVAL_SECS: 5

              BOOKBOSS__OIDC__DISCOVERY_URL: https://id.${SECRET_DOMAIN}
              BOOKBOSS__OIDC__BUTTON_LABEL: Sign in with Pocket-ID
              TZ: ${TIMEZONE}
            envFrom:
              - secretRef:
                  name: bookboss-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: [ALL] }
    service:
      bookboss:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
          - "books.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: networking
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: bookboss
          gethomepage.dev/description: Book Library Manager
          gethomepage.dev/group: Downloaders
    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /data
            subPath: data
      library:
        type: nfs
        server: nas.${PUBLIC_DOMAIN}
        path: /mnt/tank/media
        advancedMounts:
          bookboss:
            bookboss:
              - path: /library/books
                subPath: books
              - path: /library/bookdrop
                subPath: bookdrop
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
