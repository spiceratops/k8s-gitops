---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tidarr
  namespace: media
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 1h

  values:
    controllers:
      tidarr:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/cstaelen/tidarr
              tag: 1.1.2@sha256:779cee18bda01e757b6bd410da5e9ff69ff511beb267c192cd7f73e7add7a1da
            env:
              TZ: "${TIMEZONE}"
              REACT_APP_TIDAL_COUNTRY_CODE: AU
              REACT_APP_TIDARR_DEFAULT_QUALITY_FILTER: lossless
              ENABLE_BEETS: "true"
              PUID: 1000
              PGID: 1000
            envFrom:
              - secretRef:
                  name: tidarr-secret
            resources:
              requests:
                cpu: 50m
                memory: 250Mi
              limits:
                memory: 2000Mi
    service:
      app:
        controller: tidarr
        ports:
          http:
            port: &port 8484
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /home/app/standalone/shared
      tiddl:
        type: secret
        name: tidarr-secret
        globalMounts:
          - path: /home/app/standalone/shared/tiddl.json
            subPath: tiddl.json
      media:
        type: nfs
        server: nas.${PUBLIC_DOMAIN}
        path: /mnt/tank/media/music
        globalMounts:
          - path: /home/app/standalone/download/albums
            subPath: albums
          - path: /home/app/standalone/download/tracks
            subPath: tracks
          - path: /home/app/standalone/download/playlists
            subPath: playlists
          - path: /home/app/standalone/download/videos
            subPath: videos
      download:
        type: nfs
        server: nas.${PUBLIC_DOMAIN}
        path: /mnt/tank/media/downloads/tidarr
        globalMounts:
          - path: /home/app/standalone/download/incomplete
            subPath: albums
