---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ytdl-sub
  namespace: media
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: ytdl-sub-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        youtube_cookies.txt: "{{ .youtube_cookies.txt }}"
  dataFrom:
    - extract:
        key: youtube-cookies
