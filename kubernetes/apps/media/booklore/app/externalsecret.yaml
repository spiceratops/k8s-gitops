---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: booklore
  namespace: media
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: booklore-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        MARIADB_PASSWORD: &dbpass "{{ .BOOKLORE_MARIADB_PASSWORD }}"
        DATABASE_PASSWORD: *dbpass
        MARIADB_ROOT_PASSWORD: "{{ .BOOKLORE_MARIADB_ROOT_PASSWORD }}"
  dataFrom:
    - extract:
        key: booklore
